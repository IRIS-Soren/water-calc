<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加水计算器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; padding: 20px; display: flex; justify-content: center; color: #1e293b; }
        .card { background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        h2 { color: #0f172a; font-size: 1.5rem; margin-bottom: 8px; margin-top: 0; }
        p.tips { font-size: 0.85rem; color: #64748b; margin-bottom: 24px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: #475569; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #0f172a; }
        button { width: 100%; padding: 14px; background: #0f172a; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        #result-box { margin-top: 24px; padding: 20px; border-radius: 16px; background: #f1f5f9; }
        .result-label { font-size: 0.8rem; color: #64748b; margin-bottom: 4px; }
        .result-val { font-size: 2.2rem; font-weight: 800; color: #0f172a; }
        #formula-detail { font-size: 0.8rem; color: #94a3b8; margin-top: 12px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>加水计算器</h2>
    <p class="tips">输入数值后点击计算，系统将按湿基含水率得出结果。</p>
    
    <div class="input-group">
        <label>当前含水率 (%)</label>
        <input type="number" id="wm" placeholder="例如：10.35">
    </div>
    <div class="input-group">
        <label>当前总重量 (g)</label>
        <input type="number" id="mass" placeholder="例如：700">
    </div>
    <div class="input-group">
        <label>目标含水率 (%)</label>
        <input type="number" id="tm" placeholder="例如：12">
    </div>
    
    <button onclick="calculate()">计算结果</button>

    <div id="result-box">
        <div class="result-label">需要补加水量：</div>
        <div class="result-val" id="water-result">-</div>
        <div id="formula-detail">等待输入数据...</div>
    </div>
</div>

<script>
function calculate() {
    // 获取输入值
    const wmStr = document.getElementById('wm').value;
    const mStr = document.getElementById('mass').value;
    const tmStr = document.getElementById('tm').value;

    const wm = parseFloat(wmStr);
    const m = parseFloat(mStr);
    const tm = parseFloat(tmStr);

    // 检查是否为空或无效
    if (wmStr === "" || mStr === "" || tmStr === "" || isNaN(wm) || isNaN(m) || isNaN(tm)) {
        alert("请完整填写三个数值再进行计算哦！");
        return;
    }

    const waterResult = document.getElementById('water-result');
    const formulaDetail = document.getElementById('formula-detail');

    if (tm <= wm) {
        waterResult.innerText = "0.00 g";
        formulaDetail.innerText = "提示：目标含水率不高于当前含水率，无需加水。";
    } else {
        // 核心公式：干物质守恒
        // 干物质 = 当前总重 * (1 - 当前含水率)
        const dryMatter = m * (1 - wm / 100);
        // 补水量 = (干物质 / (1 - 目标含水率)) - 当前总重
        const addedWater = (dryMatter / (1 - tm / 100)) - m;

        waterResult.innerText = addedWater.toFixed(2) + " g";
        formulaDetail.innerText = 
            `计算详情：当前干物质 ${dryMatter.toFixed(2)}g，需补水至总重 ${(m + addedWater).toFixed(2)}g。`;
    }
}
</script>

</body>
</html>
